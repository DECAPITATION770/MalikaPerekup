# Local development stack — `docker compose up -d` from infra/.
#
# Brings up Postgres, Redis, MinIO, and the backend API+bot in one process.
# The Mini App is served separately by `pnpm dev` (Vite) for instant HMR.

services:

  postgres:
    image: postgres:16-alpine
    container_name: malika_postgres
    environment:
      POSTGRES_USER: malika
      POSTGRES_PASSWORD: malika
      POSTGRES_DB: malika
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U malika"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: malika_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: malika_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Test database used by `pytest` — separate from the dev DB so running
  # tests never touches your local data.
  postgres_test:
    image: postgres:16-alpine
    container_name: malika_postgres_test
    environment:
      POSTGRES_USER: malika
      POSTGRES_PASSWORD: malika
      POSTGRES_DB: malika_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data   # ephemeral — wipe on restart
    profiles: ["test"]
    restart: "no"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: malika_backend
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    profiles: ["full"]   # opt-in: `docker compose --profile full up -d`
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
