# Production stack — закрывает блокер v1 (в v1 этот файл был 0 байт).
# Запуск: docker compose -f infra/docker-compose.prod.yml up -d
# Перед запуском: задать переменные POSTGRES_PASSWORD, JWT_SECRET, BOT_TOKEN, S3_* через
# .env-файл рядом или secret manager.

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      ENV: prod
      DATABASE_URL: postgresql+asyncpg://malika:${POSTGRES_PASSWORD}@postgres:5432/malika
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      BOT_TOKEN: ${BOT_TOKEN}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-auto}
      DEV_AUTH_BYPASS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  tenant:
    build:
      context: ../tenant
      dockerfile: Dockerfile
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: malika
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: malika
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U malika -d malika"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-malika.example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - tenant
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
