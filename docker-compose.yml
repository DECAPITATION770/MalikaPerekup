# syntax=docker/dockerfile:1.7
# Root-level compose — brings up the full stack:
#   postgres, redis, minio, backend (API + bot), admin panel (nginx)
#
# Usage:
#   docker compose up -d            # start everything
#   docker compose logs -f backend  # follow backend logs
#   docker compose down -v          # stop and remove volumes

services:

  # ─── Infrastructure ─────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: malika_postgres
    environment:
      POSTGRES_USER: malika
      POSTGRES_PASSWORD: malika
      POSTGRES_DB: malika
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U malika"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ─── Test database (only with `--profile test`) ─────────────────────
  # Dedicated throwaway Postgres for `cd backend && uv run pytest`. The
  # test suite drops & recreates the public schema, so it MUST stay
  # separate from the dev `postgres` above. See backend/tests/conftest.py.
  #   docker compose --profile test up -d postgres_test
  postgres_test:
    image: postgres:16-alpine
    container_name: malika_postgres_test
    profiles: ["test"]
    environment:
      POSTGRES_USER: malika
      POSTGRES_PASSWORD: malika
      POSTGRES_DB: malika_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U malika"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: malika_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: malika_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ─── Migrations (runs once, then exits) ─────────────────────────────

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: malika_migrate
    command: alembic upgrade head
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── Backend (FastAPI + aiogram bot in one process) ─────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: malika_backend
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backup_data:/backups
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─── Admin panel (built React app served by nginx) ──────────────────

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: malika_admin
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backup_data:
