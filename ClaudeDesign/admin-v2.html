<style>
  html,body{margin:0;padding:0;background:#f0eee9;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{overflow:hidden}
  *,*::before,*::after{box-sizing:border-box}

  /* ── Entrance animations ── */
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
  @keyframes shimmer{0%{background-position:-400% 0}100%{background-position:400% 0}}
  @keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 currentColor}50%{box-shadow:0 0 0 4px transparent}}

  /* Staggered list items — apply .fia-N to each row/card */
  .fia{animation:fadeUp .22s cubic-bezier(.2,.7,.3,1) both}
  .fia-1{animation-delay:.03s}.fia-2{animation-delay:.06s}
  .fia-3{animation-delay:.09s}.fia-4{animation-delay:.12s}
  .fia-5{animation-delay:.15s}.fia-6{animation-delay:.18s}
  .fia-7{animation-delay:.21s}.fia-8{animation-delay:.24s}
  .fia-9{animation-delay:.27s}
  .kpi-in{animation:scaleIn .28s cubic-bezier(.34,1.56,.64,1) both}
  .kpi-in-1{animation-delay:.04s}.kpi-in-2{animation-delay:.1s}.kpi-in-3{animation-delay:.16s}

  /* Hover micro-interactions */
  .c-hover{transition:transform .14s ease-out,box-shadow .14s ease-out}
  .c-hover:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.22)!important}
  .row-hover{transition:background .1s}
  .row-hover:hover{background:rgba(255,255,255,.04)!important}
  .nav-item{transition:background .12s,color .12s,transform .1s;cursor:pointer}
  .nav-item:hover{transform:translateX(2px)}
  .btn-press{transition:transform .08s,opacity .08s}
  .btn-press:active{transform:scale(.95);opacity:.85}
  .chip-hover{transition:background .12s,color .12s,border-color .12s;cursor:pointer}

  /* Skeleton shimmer */
  .sk{background:linear-gradient(90deg,rgba(255,255,255,.05) 25%,rgba(255,255,255,.1) 50%,rgba(255,255,255,.05) 75%);background-size:400% 100%;animation:shimmer 1.6s ease-in-out infinite;border-radius:6px}

  /* Live status dot pulse */
  @keyframes liveDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
  .live-dot{animation:liveDot 2s ease-in-out infinite}

  /* Tooltip on hover */
  [data-tip]{position:relative}
  [data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;font-size:11px;white-space:nowrap;padding:4px 8px;border-radius:6px;pointer-events:none;z-index:99}

  /* Scrollbar invisible */
  ::-webkit-scrollbar{display:none}
  *{scrollbar-width:none}
</style>

/* ── Mini sparkline SVG ──────────────────────────────────────── */
function Sparkline({ data, color, width = 80, height = 32, fill = false }) {
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const xStep = width / (data.length - 1);
  const pts = data.map((v, i) => `${i * xStep},${height - ((v - min) / range) * (height - 4) - 2}`).join(' ');
  const area = `M ${pts.split(' ').join(' L ')} L ${(data.length - 1) * xStep},${height} L 0,${height} Z`;
  const line = `M ${pts.split(' ').join(' L ')}`;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ overflow: 'visible' }}>
      {fill && <path d={area} fill={color} opacity={0.12}/>}
      <path d={line} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={(data.length - 1) * xStep} cy={height - ((data[data.length-1] - min) / range) * (height - 4) - 2} r="3" fill={color}/>
    </svg>
  );
}

/* ── Mini bar chart ──────────────────────────────────────────── */
function MiniBarChart({ data, color, height = 36, width = 80, labels }) {
  const max = Math.max(...data) || 1;
  const barW = width / data.length - 3;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      {data.map((v, i) => {
        const bh = (v / max) * (height - (labels ? 14 : 2));
        const y = height - bh - (labels ? 14 : 0);
        return (
          <g key={i}>
            <rect x={i * (barW + 3)} y={y} width={barW} height={bh}
              fill={color} rx="2" opacity={i === data.length - 1 ? 1 : 0.55}/>
          </g>
        );
      })}
    </svg>
  );
}

/* ── KPI card with sparkline ─────────────────────────────────── */

              <span style={{ fontSize: 11, color: theme.textMuted }}>vs вчера</span>
            </div>
          )}
        </div>
        {sparkData && <Sparkline data={sparkData} color={c} fill/>}
      </div>
    </div>
  );
}

/* TWEAKS + APP ROOT                                             */
/* ══════════════════════════════════════════════════════════════ */
const TWEAK_DEFAULTS = {
  accent: 'telegram',
  density: 'balanced',
  showLight: true,
  showUzbek: true,
};

function App() {
  const [values] = window.useTweaks(TWEAK_DEFAULTS);
  const dark  = window.makeTheme(true,  values.accent);
  const light = window.makeTheme(false, values.accent);
  const lang  = (k) => values.showUzbek && k === 'uz' ? 'uz' : 'ru';

  const Frame = ({ theme, w = 390, h = 780 }) => (props) => (
    <window.IOSDevice width={w} height={h} dark={theme.name === 'dark'}>
      {props.children}
    </window.IOSDevice>
  );

  const pair = ({ id, label, w = 390, h = 780, render }) => ([
    <window.DCArtboard key={`${id}-d`} id={`${id}-d`} label={`${label} · Dark`} width={w} height={h}>
      <window.IOSDevice width={w} height={h} dark>{render(dark, 'ru')}</window.IOSDevice>
    </window.DCArtboard>,
    values.showLight && (
      <window.DCArtboard key={`${id}-l`} id={`${id}-l`} label={`${label} · Light${values.showUzbek?' · O\'zbek':''}`} width={w} height={h}>
        <window.IOSDevice width={w} height={h}>{render(light, lang('uz'))}</window.IOSDevice>
      </window.DCArtboard>
    ),
  ].filter(Boolean));

  const deskPair = ({ id, label, w = 1024, h = 680, render }) => ([
    <window.DCArtboard key={`${id}-d`} id={`${id}-d`} label={`${label} · Dark`} width={w} height={h}>
      {render(dark, 'ru')}
    </window.DCArtboard>,
    values.showLight && (
      <window.DCArtboard key={`${id}-l`} id={`${id}-l`} label={`${label} · Light`} width={w} height={h}>
        {render(light, lang('uz'))}
      </window.DCArtboard>
    ),
  ].filter(Boolean));

  return (
    <>
      <window.TweaksPanel defaults={TWEAK_DEFAULTS}/>
      <window.DesignCanvas>

        {/* ── INTRO ── */}
        <window.DCSection id="intro" title="Malika Admin v2" subtitle="Улучшенный дизайн · Анимации · Dashboard · RU + O'zbek · Dark + Light">
          <window.DCPostIt width={280}>
            <b>Новое в v2</b><br/><br/>
            ✦ Дашборд платформы (A0)<br/>
            ✦ Sparkline-графики на всех KPI<br/>
            ✦ Stagger-анимации списков<br/>
            ✦ Live-индикатор в журнале<br/>
            ✦ Desktop: sidebar + topbar<br/>
            ✦ Hover-эффекты на всех картах<br/>
            ✦ Alert-баннер для угроз<br/>
            ✦ Urgency-цвет по сроку долга
          </window.DCPostIt>
          <window.DCPostIt width={260} rotate={2}>
            <b>Анимации (ux-pro-max)</b><br/><br/>
            • fadeUp 220ms ease-out<br/>
            • stagger 30ms per item<br/>
            • scaleIn spring для KPI<br/>
            • hover: translateY(-2px)<br/>
            • active: scale(0.95)<br/>
            • live-dot pulse 2s<br/>
            • shimmer skeleton<br/>
            • chip transition 120ms
          </window.DCPostIt>
        </window.DCSection>

        {/* ── MOBILE: DASHBOARD ── */}
        <window.DCSection id="mobile-dashboard" title="A0 — Дашборд платформы" subtitle="Главный экран админа: KPI, быстрые действия, активность">
          {pair({ id:'dash', label:'A0 Dashboard', render:(t,l)=><ScreenAdminDashboard theme={t} lang={l}/> })}
        </window.DCSection>

        {/* ── MOBILE: SHOPS ── */}
        <window.DCSection id="mobile-shops" title="A1 — Магазины" subtitle="Список с фильтрами + статусы устройств/продаж">
          {pair({ id:'shops', label:'A1 Shops', render:(t,l)=><ScreenAdminShops2 theme={t} lang={l}/> })}
        </window.DCSection>

        {/* ── MOBILE: SHOP CARD ── */}
        <window.DCSection id="mobile-shopcard" title="A2 — Карточка магазина" subtitle="Детальная инфо + история входов + экстренный звонок">

        </window.DCSection>

        {/* ── MOBILE: CREATE ── */}

      </window.DesignCanvas>
    </>
  );
}
