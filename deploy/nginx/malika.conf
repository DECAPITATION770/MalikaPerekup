# ─────────────────────────────────────────────────────────────────────────
# Malika — edge reverse proxy (TLS termination + host routing).
#
# Two sub-domains, one backend:
#   app.example.uz    → tenant Mini App  (static SPA) + /api → backend
#   admin.example.uz  → admin panel      (static SPA) + /api → backend
#
# BEFORE DEPLOY — replace in this file:
#   1. every  app.example.uz   → your Mini App host
#   2. every  admin.example.uz → your admin host
#   3. the ssl_certificate paths if you don't use the certbot layout below
#
# TLS certs are expected at /etc/letsencrypt/live/<host>/ (mounted from the
# host — see deploy/README.md → "TLS"). The /.well-known/acme-challenge
# location serves certbot's HTTP-01 challenge from a shared webroot volume.
# ─────────────────────────────────────────────────────────────────────────

upstream malika_backend { server backend:8000; }
upstream malika_tenant  { server tenant:80;   }
upstream malika_admin   { server admin:80;    }

# Shared proxy headers for /api.
# (kept in a map-free include-style block repeated per location for clarity)

# ─── HTTP :80 — ACME challenge + redirect everything else to HTTPS ───────
server {
    listen 80;
    listen [::]:80;
    server_name app.example.uz admin.example.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── app.example.uz — tenant Mini App ────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.example.uz;

    ssl_certificate     /etc/letsencrypt/live/app.example.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.example.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # 50 MB = per-file upload cap. Presigned PUTs go straight to object
    # storage (R2/MinIO), not through here, but keep the limit for any
    # multipart that does transit the API.
    client_max_body_size 50m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location /api/ {
        proxy_pass http://malika_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 50m;
    }

    location / {
        proxy_pass http://malika_tenant;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── admin.example.uz — platform admin panel ─────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.example.uz;

    ssl_certificate     /etc/letsencrypt/live/admin.example.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.example.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 50m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    # Admin is operator-only — keep it out of search indexes.
    add_header X-Robots-Tag "noindex, nofollow" always;

    location /api/ {
        proxy_pass http://malika_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://malika_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
