# ─────────────────────────────────────────────────────────────────────────
# Malika Perekup — HOST nginx site (system nginx on :80).
#
# Install on the server as:
#   /etc/nginx/sites-available/perekup
#   ln -s ../sites-available/perekup /etc/nginx/sites-enabled/perekup
#   nginx -t && systemctl reload nginx
#
# TLS is terminated at Cloudflare (the origin only ever speaks :80). Each
# server block forwards a public sub-domain to a container bound on
# 127.0.0.1 by deploy/docker-compose.prod.yml. The SPA containers proxy
# their own /api/ to the backend over the docker network, so there is no
# separate api sub-domain.
# ─────────────────────────────────────────────────────────────────────────

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# --- Tenant Mini App (Telegram WebApp) ------------------------------------
# Telegram requires HTTPS — satisfied by Cloudflare in front of this origin.
server {
    listen 80;
    server_name perekup-app.iboshka.xyz;

    # Per-file upload cap; pre-signed PUTs go straight to MinIO (s3.*), not
    # through here, but keep parity with the container/app limit.
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }
}

# --- Platform admin panel -------------------------------------------------
server {
    listen 80;
    server_name perekup-admin.iboshka.xyz;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:3011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }
}

# --- MinIO (browser-facing pre-signed URLs) -------------------------------
# The bucket stays PRIVATE (CLAUDE.md §10) — objects are only reachable via
# short-lived pre-signed URLs the backend signs for this host.
server {
    listen 80;
    server_name perekup-s3.iboshka.xyz;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:9120;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
