# ─────────────────────────────────────────────────────────────────────────
# Malika Perekup — PRODUCTION stack (host-nginx topology).
#
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d --build
#
# This host already runs a system nginx (1.24) on :80 as the shared reverse
# proxy for several projects, with TLS terminated at Cloudflare. So unlike a
# self-contained edge+certbot setup, this stack does NOT publish 80/443.
# Instead it binds the two SPAs and MinIO to 127.0.0.1 high ports, and the
# host nginx (deploy/nginx/perekup.conf) proxies the public sub-domains to
# them. Postgres, Redis and the backend stay entirely on the internal
# `perekup` network.
#
#   perekup-app.iboshka.xyz   → 127.0.0.1:3010  (tenant Mini App SPA; self-proxies /api → backend)
#   perekup-admin.iboshka.xyz → 127.0.0.1:3011  (admin panel SPA;     self-proxies /api → backend)
#   perekup-s3.iboshka.xyz    → 127.0.0.1:9120  (MinIO; serves browser pre-signed URLs)
#
# The bot runs in long-polling mode (no inbound webhook), so the backend
# needs no public ingress.
# ─────────────────────────────────────────────────────────────────────────

name: perekup

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-malika}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-malika}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-malika}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Self-hosted object storage. The backend reaches it over the docker
  # network at `minio:9000`; the browser reaches the SAME bucket through the
  # public host `perekup-s3.iboshka.xyz` (host nginx → 127.0.0.1:9120), which
  # is the host pre-signed URLs are signed for (S3_PUBLIC_ENDPOINT).
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY in .env.prod}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY in .env.prod}
    ports:
      - "127.0.0.1:9120:9000"   # S3 API — proxied as perekup-s3.iboshka.xyz
      - "127.0.0.1:9121:9001"   # console — localhost only (ops convenience)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Runs migrations once, then exits. Backend waits for it to succeed.
  migrate:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: alembic upgrade head
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: .env.prod
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - backup_data:/backups
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  tenant:
    build:
      context: ../tenant
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3010:80"
    restart: unless-stopped

  admin:
    build:
      context: ../admin
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3011:80"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backup_data:
