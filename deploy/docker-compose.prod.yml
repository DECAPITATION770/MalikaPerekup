# ─────────────────────────────────────────────────────────────────────────
# Malika — PRODUCTION stack.
#
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d --build
#
# Topology: only the `edge` nginx is exposed to the internet (80/443).
# Postgres, Redis, the backend API and the static front-ends all live on the
# internal `malika` network and are NOT published to the host.
#
# Object storage: default is external Cloudflare R2 (set S3_* in .env.prod).
# To self-host MinIO instead, start with `--profile selfhost-storage` and
# read deploy/README.md → "Object storage".
# ─────────────────────────────────────────────────────────────────────────

name: malika

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-malika}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-malika}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-malika}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Optional self-hosted object storage. Only starts with:
  #   docker compose ... --profile selfhost-storage up -d
  # If you use it, also add a `cdn.<domain>` server block to nginx that
  # proxies to minio:9000, and point S3_PUBLIC_ENDPOINT at that host.
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    profiles: ["selfhost-storage"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Runs migrations once, then exits. Backend waits for it to succeed.
  migrate:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: alembic upgrade head
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file: .env.prod
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    volumes:
      - backup_data:/backups
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  tenant:
    build:
      context: ../tenant
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  admin:
    build:
      context: ../admin
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  edge:
    image: nginx:1.27-alpine
    depends_on:
      - tenant
      - admin
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/malika.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backup_data:
