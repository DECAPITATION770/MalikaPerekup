server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 50 MB matches the per-file upload cap (UploadUrlRequest.size_bytes).
    # Only relevant if /api is proxied through here; the edge proxy also
    # sets it. Harmless to keep both in sync.
    client_max_body_size 50m;

    # Long-cache fingerprinted assets; never cache the HTML shell so a
    # deploy is picked up on next load.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Self-hosted fonts (Geist) — immutable, long cache.
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API proxy — present so the container also works standalone (e.g.
    # published directly during a smoke test). In the full prod topology
    # the edge proxy intercepts /api/ before it reaches this container.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }

    # SPA fallback — every other route renders index.html (client router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
