<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Theme-color must match the resolved background, not the brand accent —
         iOS Safari / Telegram chrome paint this around the viewport, and a
         hardcoded amber strip on a light page reads as a stuck loader. Pair
         the meta with prefers-color-scheme; the in-app theme bridge syncs
         the actual choice after mount. -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#FAFBFD" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0B0F19" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>perekup — учёт перекупщика</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Preconnect to third-party origins we hit on first paint so the TLS
         handshake overlaps with HTML parsing. -->
    <link rel="preconnect" href="https://telegram.org" crossorigin />
    <link rel="preconnect" href="https://plausible.io" crossorigin />
    <!-- Display font preload — Geist Variable woff2 (~70 KB) covers all
         hero headlines and KPI numerals. The CSS @font-face still owns the
         font-display:swap behaviour; preload just shortens the discovery
         path so the swap from system font happens before paint settles. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/Geist-Variable.woff2"
      crossorigin
    />
    <!-- Apply a forced light/dark choice before paint to avoid a flash.
         'auto' (or unset) falls through to the in-app theme bridge. -->
    <script>
      try {
        var p = localStorage.getItem('tenant_theme');
        if (p === 'light') document.documentElement.classList.add('light');
        else if (p === 'dark') document.documentElement.classList.remove('light');
        var l = localStorage.getItem('tenant_lang');
        if (l === 'ru' || l === 'uz') document.documentElement.lang = l;
      } catch (e) {}
    </script>
    <!-- Telegram Mini App SDK — must be available before mount for auto-login,
         but `defer` still keeps it after HTML parsing without blocking it. -->
    <script defer src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Plausible (privacy-friendly, cookie-less). Set data-domain at deploy. -->
    <script
      defer
      data-domain="malika.app"
      src="https://plausible.io/js/script.js"
    ></script>
    <script>
      window.plausible =
        window.plausible ||
        function () {
          (window.plausible.q = window.plausible.q || []).push(arguments);
        };
    </script>
  </head>
  <body class="bg-bg text-text">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
