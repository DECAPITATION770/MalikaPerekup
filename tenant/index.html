<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#E89A2E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Малика — учёт перекупщика</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Apply a forced light/dark choice before paint to avoid a flash.
         'auto' (or unset) falls through to the in-app theme bridge. -->
    <script>
      try {
        var p = localStorage.getItem('tenant_theme');
        if (p === 'light') document.documentElement.classList.add('light');
        else if (p === 'dark') document.documentElement.classList.remove('light');
      } catch (e) {}
    </script>
    <!-- Telegram Mini App SDK — must load before the app so
         window.Telegram.WebApp.initData exists for auto-login. -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Plausible (privacy-friendly, cookie-less). Set data-domain at deploy. -->
    <script
      defer
      data-domain="malika.app"
      src="https://plausible.io/js/script.js"
    ></script>
    <script>
      window.plausible =
        window.plausible ||
        function () {
          (window.plausible.q = window.plausible.q || []).push(arguments);
        };
    </script>
  </head>
  <body class="bg-bg text-text">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
